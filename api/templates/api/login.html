<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>管理者登入</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 讓整個網頁底色變黑，並使用 Flexbox 讓內容水平置中、垂直靠上一些 */
        body {
            background-color: #121212;
            color: #ff9800;
            min-height: 100vh;
            display: flex;
            justify-content: center; /* 水平置中 */
            align-items: flex-start; /* 垂直靠上 */
            padding-top: 15vh;       /* 透過上方間距，讓卡片完美落在中偏上的黃金位置 */
            margin: 0;
        }

        /* 卡片背景與邊框 */
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #ff9800;
            width: 400px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); /* 加點深色陰影更有質感 */
        }

        /* 確保標題與標籤文字顏色正確 */
        .card h2, .form-label {
            color: #ff9800;
        }

        /* 輸入框樣式 */
        .form-control {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: white;
        }
        .form-control:focus {
            background-color: #2a2a2a;
            color: white;
            border-color: orange;
            box-shadow: 0 0 5px orange;
        }

        /* 按鈕樣式維持原樣 */
        .btn {
            background-color: orange;
            border: none;
            color: white;
        }
        .btn:hover {
            background-color: darkorange;
            color: white;
        }
        .btn:active {
            background-color: #000 !important;
            border-color: #000 !important;
            color: white !important;
            box-shadow: none !important;
        }
    </style>
</head>

<body>

<div class="card p-4">
    <h2 class="mb-3 text-center">管理者登入</h2>

    <label class="form-label">帳號</label>
    <input id="username" class="form-control mb-3" placeholder="請輸入帳號">

    <label class="form-label">密碼</label>
    <input id="password" type="password" class="form-control mb-3" placeholder="請輸入密碼">

    <button class="btn btn-primary w-100" onclick="login()">登入</button>
</div>

<script>
async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/api/login/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    });

    const data = await response.json();

    if (data.status === "success") {
        localStorage.setItem("token", data.token);
        alert("登入成功");
        window.location.href = "/api/dashboard/";
    } else {
        alert(data.message);
    }
}
</script>

</body>
</html>
