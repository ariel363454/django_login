<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>系統紀錄</title>
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
 
    <style>
    body {
        background-color: #121212;
        color: white;
    }
 
    .card {
        background-color: #1e1e1e;
        border: 1px solid #333;
        color: white;
    }
 
    .table {
        color: white;
    }
 
    .table th {
        background-color: #2a2a2a;
    }
 
    .table td {
        background-color: #1e1e1e;
    }
 
    .form-control {
        background-color: #2a2a2a;
        border: 1px solid #444;
        color: white;
    }
 
    .form-control:focus {
        background-color: #2a2a2a;
        color: white;
        border-color: orange;
        box-shadow: 0 0 5px orange;
    }
 
    .btn-primary {
        background-color: orange;
        border: none;
    }
 
    .btn-primary:hover {
        background-color: darkorange;
    }
 
    .btn-warning {
        background-color: #ff9800;
        border: none;
        color: black;
    }
 
    .btn-danger {
        background-color: #e53935;
    }
 
    .btn-success {
        background-color: #ff9800;
        border: none;
        color: black;
    }
 
    h1, h2, h3 {
        color: orange;
    }
 
    .table td,
    .table th {
        color: white !important;
    }
 
    .container {
        background-color: #121212;
    }
 
    html {
        background-color: #121212;
    }
 
    .footer {
        margin-left: 240px;
        width: calc(100% - 240px);
        background-color: #181818;
        border-top: 1px solid #333;
        color: #aaa;
    }
 
    .footer-link {
        color: orange;
        text-decoration: none;
    }
 
    .footer-link:hover {
        color: darkorange;
    }
 
    .form-control::placeholder {
        color: white !important;
        opacity: 0.7;
    }
 
    .layout {
        display: flex;
        min-height: 100vh;
        background-color: #121212;
    }
 
    .sidebar {
        width: 240px;
        background-color: #181818;
        border-right: 1px solid #333;
        padding: 24px 16px;
        position: fixed;
        height: 100vh;
    }
 
    .sidebar-title {
        color: orange;
        font-size: 22px;
        margin-bottom: 32px;
    }
 
    .sidebar-link {
        display: block;
        color: #ccc;
        text-decoration: none;
        padding: 12px 14px;
        border-radius: 8px;
        margin-bottom: 10px;
    }
 
    .sidebar-link:hover {
        background-color: #2a2a2a;
        color: white;
    }
 
    .sidebar-link.active {
        background-color: orange;
        color: black;
        font-weight: bold;
    }
 
    .sidebar-logout {
        position: absolute;
        bottom: 24px;
        left: 16px;
        right: 16px;
        background-color: #e53935;
        border: none;
        color: white;
        padding: 10px;
        border-radius: 8px;
    }
 
    .main-content {
        margin-left: 240px;
        padding: 40px;
        width: calc(100% - 240px);
    }
 
    .btn:active {
        background-color: #000 !important;
        border-color: #000 !important;
        color: white !important;
        box-shadow: none !important;
    }
    </style>
</head>
 
<body>
 
 
<div class="layout">
 
    <aside class="sidebar">
        <h2 class="sidebar-title">Parking Admin</h2>
 
        <a href="/api/dashboard/" class="sidebar-link">
            停車場管理
        </a>
 
        <a href="/api/logs/" class="sidebar-link active">
            系統紀錄
        </a>
 
        <button class="sidebar-logout" onclick="logout()">
            登出
        </button>
    </aside>
 
    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
 
            <h1>系統紀錄</h1>
 
        </div>
 
        <div class="card p-4 mt-4">
            <h3>爬蟲更新紀錄</h3>
 
            <button class="btn btn-primary mb-3" onclick="loadUpdateHistory()">
                重新整理爬蟲紀錄
            </button>
 
            <table class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>資料類型</th>
                        <th>狀態</th>
                        <th>備註</th>
                        <th>更新時間</th>
                    </tr>
                </thead>
 
                <tbody id="historyTableBody">
                    <tr>
                        <td colspan="5" class="text-center">尚未載入</td>
                    </tr>
                </tbody>
            </table>
        </div>
 
        <div class="card p-4 mt-4">
            <h3>管理者操作紀錄</h3>
 
            <button class="btn btn-primary mb-3" onclick="loadAdminActionLogs()">
                重新整理操作紀錄
            </button>
 
            <table class="table table-bordered table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>管理者</th>
                        <th>動作</th>
                        <th>資料表</th>
                        <th>目標 ID</th>
                        <th>描述</th>
                        <th>時間</th>
                    </tr>
                </thead>
 
                <tbody id="adminActionLogTableBody">
                    <tr>
                        <td colspan="7" class="text-center">尚未載入</td>
                    </tr>
                </tbody>
            </table>
        </div>
 
    </main>
 
</div>
 
 
 
<footer class="footer mt-5 py-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            勤勞樸實
        </div>
    </div>
</footer>
 
<script>
const token = localStorage.getItem("token");
 
async function checkLogin() {
    if (!token) {
        alert("請先登入");
        window.location.href = "https://django-tp-login-h4aghjbncxc4eyhc.eastasia-01.azurewebsites.net/api/login-page/";
        return;
    }
 
    const response = await fetch("https://django-tp-login-h4aghjbncxc4eyhc.eastasia-01.azurewebsites.net/api/test-admin/", {
        headers: {
            "Authorization": "Token " + token
        }
    });
 
    if (!response.ok) {
        alert("登入已失效，請重新登入");
        localStorage.removeItem("token");
        window.location.href = "https://django-tp-login-h4aghjbncxc4eyhc.eastasia-01.azurewebsites.net/api/login-page/";
        return;
    }
}
 
function logout() {
    if (!confirm("確認登出嗎？")) {
        return;
    }
 
    localStorage.removeItem("token");
    alert("已登出");
    window.location.href = "/api/login-page/";
}
 
async function loadUpdateHistory() {
    const response = await fetch("/api/update-history/", {
        headers: {
            "Authorization": "Token " + token
        }
    });
 
    const data = await response.json();
 
    const tbody = document.getElementById("historyTableBody");
    tbody.innerHTML = "";
 
    if (data.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="5" class="text-center">目前沒有爬蟲紀錄</td>
            </tr>
        `;
        return;
    }
 
    data.forEach(h => {
        tbody.innerHTML += `
            <tr>
                <td>${h.his_id}</td>
                <td>${h.data_type}</td>
                <td>${h.status}</td>
                <td>${h.note}</td>
                <td>${h.update_time}</td>
            </tr>
        `;
    });
}
 
async function loadAdminActionLogs() {
    const response = await fetch("/api/admin-action-logs/", {
        headers: {
            "Authorization": "Token " + token
        }
    });
 
    const data = await response.json();
 
    const tbody = document.getElementById("adminActionLogTableBody");
    tbody.innerHTML = "";
 
    if (data.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="7" class="text-center">目前沒有操作紀錄</td>
            </tr>
        `;
        return;
    }
 
    data.forEach(log => {
        tbody.innerHTML += `
            <tr>
                <td>${log.action_id}</td>
                <td>${log.admin_username}</td>
                <td>${log.action_type}</td>
                <td>${log.target_table}</td>
                <td>${log.target_id}</td>
                <td>${log.description}</td>
                <td>${log.created_at}</td>
            </tr>
        `;
    });
}
 
checkLogin();
loadUpdateHistory();
loadAdminActionLogs();
</script>
 
</body>
</html>
